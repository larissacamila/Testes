<script>

const SYMBOLS = [
    { src: "forte.jpg", name: "forte" },
    { src: "folha.jpg", name: "folha" },
    { src: "moeda.jpg", name: "moeda" },
    { src: "wild.jpg", name: "wild" },
    { src: "saco.png", name: "saco" }
];

const SYMBOL_HEIGHT = 100;
const TOTAL_SYMBOLS = 20;

const reels = [
document.getElementById("reel1"),
document.getElementById("reel2"),
document.getElementById("reel3")
];

const spinBtn = document.getElementById("spin-btn");
const creditsDisplay = document.getElementById("credits");

let credits = 100;

let reelPositions = [0,0,0];

function createSymbol(symbol, top){

    const div = document.createElement("div");
    div.className = "symbol";
    div.style.top = top+"px";

    div.innerHTML =
    `<img src="${symbol.src}" alt="${symbol.name}">`;

    div.dataset.symbol = symbol.name;

    return div;
}

function initReels(){

    reels.forEach((reel,i)=>{

        reel.innerHTML="";

        for(let j=0;j<TOTAL_SYMBOLS;j++){

            const random =
            SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];

            reel.appendChild(
                createSymbol(random, j*SYMBOL_HEIGHT)
            );

        }

    });

}

function spin(){

    if(credits<=0){
        alert("Sem créditos!");
        return;
    }

    credits--;

    creditsDisplay.innerText = credits;

    spinBtn.disabled=true;

    let results=[];

    reels.forEach((reel,i)=>{

        const randomIndex =
        Math.floor(Math.random()*TOTAL_SYMBOLS);

        reelPositions[i] = randomIndex;

        const offset = randomIndex*SYMBOL_HEIGHT;

        const spinDistance =
        (TOTAL_SYMBOLS*SYMBOL_HEIGHT*3)+offset;

        reel.style.transition =
        "transform "+(2000+i*400)+"ms cubic-bezier(.2,.8,.2,1)";

        reel.style.transform =
        "translateY(-"+spinDistance+"px)";

        setTimeout(()=>{

            reel.style.transition="none";

            reel.style.transform =
            "translateY(-"+offset+"px)";

            const symbol =
            reel.children[randomIndex].dataset.symbol;

            results.push(symbol);

            if(results.length===3){

                checkWin(results);

                spinBtn.disabled=false;

            }

        },2000+i*400);

    });

}

function checkWin(res){

console.log(res);

if(res[0]===res[1] && res[1]===res[2]){

let prize = 20;

if(res[0]==="wild") prize=50;

credits+=prize;

alert("🎉 Ganhou "+prize+" créditos!");

}

else if(res.includes("wild")){

credits+=10;

alert("⭐ Wild pagou 10!");

}

creditsDisplay.innerText = credits;

}

spinBtn.onclick = spin;

initReels();

</script>
