<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogo de Slots</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:#1a1a2e;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
color:white;
margin-bottom:20px;
}

.slot-machine{
background:#6a0dad;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px rgba(0,0,0,0.5);
}

.reels-container{
display:flex;
gap:10px;
margin-bottom:20px;
border:3px solid gold;
padding:5px;
background:#3a0ca3;
border-radius:10px;
}

.reel{
width:100px;
height:300px;
background:white;
border-radius:8px;
overflow:hidden;
position:relative;
}

.symbol{
width:100%;
height:100px;
position:absolute;
display:flex;
align-items:center;
justify-content:center;
}

.symbol img{
max-width:90%;
max-height:90%;
object-fit:contain;
}

.controls{
display:flex;
flex-direction:column;
align-items:center;
gap:15px;
}

.credits{
color:white;
font-size:20px;
font-weight:bold;
}

#spin-btn{
padding:15px 40px;
font-size:18px;
font-weight:bold;
background:#ff2a6d;
color:white;
border:none;
border-radius:25px;
cursor:pointer;
}

#spin-btn:disabled{
background:#888;
}

</style>
</head>

<body>

<h1>Meu Slot</h1>

<div class="slot-machine">

<div class="reels-container">

<div class="reel" id="reel1"></div>
<div class="reel" id="reel2"></div>
<div class="reel" id="reel3"></div>

</div>

<div class="controls">

<div class="credits">
Créditos: <span id="credits">100</span>
</div>

<button id="spin-btn">Girar</button>

</div>

</div>

<script>

const SYMBOLS=[
{src:"forte.jpg",name:"forte"},
{src:"folha.jpg",name:"folha"},
{src:"moeda.jpg",name:"moeda"},
{src:"wild.jpg",name:"wild"},
{src:"saco.png",name:"saco"}
];

const reels=[
document.getElementById("reel1"),
document.getElementById("reel2"),
document.getElementById("reel3")
];

const spinBtn=document.getElementById("spin-btn");
const creditsDisplay=document.getElementById("credits");

let credits=100;

function randomSymbol(){
return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];
}

function createSymbol(symbol,top){

const div=document.createElement("div");
div.className="symbol";
div.style.top=top+"px";

div.innerHTML=`<img src="${symbol.src}">`;
div.dataset.symbol=symbol.name;

return div;

}

function initReels(){

reels.forEach(reel=>{

reel.innerHTML="";

for(let i=0;i<3;i++){

const s=randomSymbol();

reel.appendChild(
createSymbol(s,i*100)
);

}

});

}

function spin(){

if(credits<=0){

alert("Sem créditos!");
return;

}

credits--;

creditsDisplay.innerText=credits;

spinBtn.disabled=true;

let results=[];

reels.forEach((reel,index)=>{

setTimeout(()=>{

reel.innerHTML="";

for(let i=0;i<3;i++){

const s=randomSymbol();

reel.appendChild(
createSymbol(s,i*100)
);

if(i===1){
results.push(s.name);
}

}

if(results.length===3){

checkWin(results);
spinBtn.disabled=false;

}

},500+index*500);

});

}

function checkWin(r){

if(r[0]===r[1] && r[1]===r[2]){

let win=20;

if(r[0]==="wild") win=50;

credits+=win;

alert("🎉 Ganhou "+win+" créditos!");

}

else if(r.includes("wild")){

credits+=10;

alert("⭐ Wild pagou 10!");

}

creditsDisplay.innerText=credits;

}

spinBtn.onclick=spin;

initReels();

</script>

</body>
</html>
