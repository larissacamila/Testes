<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slot Cassino</title>

<style>

body{
background:#111;
color:white;
text-align:center;
font-family:Arial;
}

h1{
margin-top:20px;
}

.slot{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.rolo{
width:120px;
height:120px;
background:#222;
border:4px solid gold;
border-radius:10px;
overflow:hidden;
}

.rolo img{
width:100%;
height:100%;
}

button{
margin-top:30px;
padding:15px 40px;
font-size:20px;
background:gold;
border:none;
border-radius:10px;
cursor:pointer;
}

#saldo{
margin-top:20px;
font-size:20px;
}

</style>
</head>

<body>

<h1>🎰 SLOT TIGRE</h1>

<div id="saldo">
Saldo: R$ <span id="valorSaldo">100</span>
</div>

<div class="slot">

<div class="rolo">
<img id="r1" src="https://i.imgur.com/7Q1Z6V6.png">
</div>

<div class="rolo">
<img id="r2" src="https://i.imgur.com/7Q1Z6V6.png">
</div>

<div class="rolo">
<img id="r3" src="https://i.imgur.com/7Q1Z6V6.png">
</div>

</div>

<button onclick="girar()">GIRAR</button>

<audio id="spinSound" src="https://assets.mixkit.co/active_storage/sfx/2003/2003-preview.mp3"></audio>
<audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/2018/2018-preview.mp3"></audio>

<audio autoplay loop>
<source src="https://cdn.pixabay.com/audio/2022/03/15/audio_115b9bce37.mp3">
</audio>

<script>

let saldo = 100
let aposta = 2

const simbolos = [
{img:"https://i.imgur.com/7Q1Z6V6.png", nome:"moeda"},
{img:"https://i.imgur.com/7Q1Z6V6.png", nome:"moeda"},
{img:"https://i.imgur.com/7Q1Z6V6.png", nome:"moeda"},
{img:"https://i.imgur.com/7Q1Z6V6.png", nome:"moeda"},

{img:"https://i.imgur.com/k3KJ3w4.png", nome:"carta"},
{img:"https://i.imgur.com/k3KJ3w4.png", nome:"carta"},
{img:"https://i.imgur.com/k3KJ3w4.png", nome:"carta"},

{img:"https://i.imgur.com/0E6Z9qC.png", nome:"tigre"},
{img:"https://i.imgur.com/0E6Z9qC.png", nome:"tigre"},

{img:"https://i.imgur.com/9Xn4YqA.png", nome:"diamante"},

{img:"https://i.imgur.com/VuKQF4C.png", nome:"jackpot"}
]

function sorteio(){
return simbolos[Math.floor(Math.random()*simbolos.length)]
}

function atualizarSaldo(){
document.getElementById("valorSaldo").innerText = saldo
}

function girar(){

if(saldo < aposta){
alert("Saldo insuficiente")
return
}

saldo -= aposta
atualizarSaldo()

document.getElementById("spinSound").play()

let giros = 20

let animacao = setInterval(()=>{

let s1 = sorteio()
let s2 = sorteio()
let s3 = sorteio()

document.getElementById("r1").src = s1.img
document.getElementById("r2").src = s2.img
document.getElementById("r3").src = s3.img

giros--

if(giros<=0){

clearInterval(animacao)

resultado(s1,s2,s3)

}

},80)

}

function resultado(a,b,c){

if(a.nome == b.nome && b.nome == c.nome){

let premio = 0

if(a.nome=="moeda") premio = aposta*5
if(a.nome=="carta") premio = aposta*10
if(a.nome=="tigre") premio = aposta*25
if(a.nome=="diamante") premio = aposta*100
if(a.nome=="jackpot") premio = aposta*500

saldo += premio

document.getElementById("winSound").play()

setTimeout(()=>{
alert("🎉 Você ganhou R$ "+premio)
},200)

}

atualizarSaldo()

}

</script>

</body>
</html>
