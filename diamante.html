<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Slot Machine</title>

<style>

body{
background:#1a1a2e;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
padding:20px;
}

h1{
color:white;
margin-bottom:20px;
}

.slot{

background:#6a0dad;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px black;

}

.reels{

display:flex;
gap:10px;
margin-bottom:20px;

}

.reel{

width:110px;
height:300px;
background:white;
overflow:hidden;
border-radius:10px;
border:3px solid gold;
position:relative;

}

.reel-strip{

position:absolute;
top:0;
width:100%;

}

.symbol{

width:100%;
height:100px;
display:flex;
align-items:center;
justify-content:center;

}

.symbol img{

max-width:90%;
max-height:90%;

}

.controls{

display:flex;
flex-direction:column;
align-items:center;
gap:10px;

}

button{

padding:15px 40px;
font-size:18px;
border:none;
border-radius:20px;
background:#ff2a6d;
color:white;
cursor:pointer;

}

button:disabled{

background:#777;

}

.credits{

color:white;
font-size:20px;

}

</style>
</head>

<body>

<h1>🎰 Meu Slot</h1>

<div class="slot">

<div class="reels">

<div class="reel">
<div class="reel-strip" id="strip1"></div>
</div>

<div class="reel">
<div class="reel-strip" id="strip2"></div>
</div>

<div class="reel">
<div class="reel-strip" id="strip3"></div>
</div>

</div>

<div class="controls">

<div class="credits">
Créditos: <span id="credits">100</span>
</div>

<button id="spin">Girar</button>

</div>

</div>

<script>

const SYMBOLS=[
{src:"forte.jpg",name:"forte"},
{src:"folha.jpg",name:"folha"},
{src:"moeda.jpg",name:"moeda"},
{src:"wild.jpg",name:"wild"},
{src:"saco.png",name:"saco"}
];

const strips=[
document.getElementById("strip1"),
document.getElementById("strip2"),
document.getElementById("strip3")
];

const spinBtn=document.getElementById("spin");

const creditsEl=document.getElementById("credits");

let credits=100;

function randomSymbol(){

return SYMBOLS[Math.floor(Math.random()*SYMBOLS.length)];

}

function createSymbol(symbol){

const div=document.createElement("div");

div.className="symbol";

div.innerHTML=`<img src="${symbol.src}">`;

div.dataset.symbol=symbol.name;

return div;

}

function buildStrip(strip){

strip.innerHTML="";

for(let i=0;i<20;i++){

const s=randomSymbol();

strip.appendChild(createSymbol(s));

}

}

function init(){

strips.forEach(buildStrip);

}

function spin(){

if(credits<=0){

alert("Sem créditos");

return;

}

credits--;

creditsEl.innerText=credits;

spinBtn.disabled=true;

let results=[];

strips.forEach((strip,i)=>{

buildStrip(strip);

const symbols=strip.children;

const stopIndex=Math.floor(Math.random()*symbols.length);

const offset=stopIndex*100;

const spinDistance=(symbols.length*100*2)+offset;

strip.style.transition="none";

strip.style.transform="translateY(0px)";

setTimeout(()=>{

strip.style.transition="transform "+(2+i*0.5)+"s cubic-bezier(.2,.8,.2,1)";

strip.style.transform="translateY(-"+spinDistance+"px)";

},50);

setTimeout(()=>{

strip.style.transition="none";

strip.style.transform="translateY(-"+offset+"px)";

results.push(symbols[stopIndex].dataset.symbol);

if(results.length===3){

checkWin(results);

spinBtn.disabled=false;

}

},2200+i*500);

});

}

function checkWin(r){

if(r[0]===r[1] && r[1]===r[2]){

let prize=20;

if(r[0]==="wild") prize=50;

credits+=prize;

alert("🎉 Ganhou "+prize);

}

else if(r.includes("wild")){

credits+=10;

alert("⭐ Wild pagou 10");

}

creditsEl.innerText=credits;

}

spinBtn.onclick=spin;

init();

</script>

</body>
</html>
