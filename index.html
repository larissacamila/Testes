<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jogos Cassino</title>

<style>

body{
    margin:0;
    font-family:Arial;
    background:#0f0f0f;
    color:white;
}

/* TOPO */
.topo{
    background:#111;
    padding:15px;
    text-align:center;
    font-size:20px;
    font-weight:bold;
}

/* GRID DOS JOGOS */

.jogos{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:12px;
    padding:15px;
}

/* CARD */

.card{
    position:relative;
    overflow:hidden;
    border-radius:12px;
}

.card img{
    width:100%;
    display:block;
    border-radius:12px;
    transition:0.3s;
}

/* EFEITO VISUAL */

.card:hover img{
    transform:scale(1.1);
}

/* TEXTO */

.nome{
    position:absolute;
    bottom:0;
    width:100%;
    background:linear-gradient(transparent,rgba(0,0,0,0.9));
    padding:8px;
    font-size:14px;
    text-align:center;
}

/* RESPONSIVO */

@media(max-width:700px){

.jogos{
grid-template-columns:repeat(2,1fr);
}

}

</style>
</head>

<body>

<div class="topo">
🔥 Jogos Populares
</div>

<div class="jogos">

<!-- CARD 1 -->
<a href="LINK_DO_JOGO_AQUI">
<div class="card">
<img src="imagem1.jpg">
<div class="nome">Gates of Olympus</div>
</div>
</a>

<!-- CARD 2 -->
<a href="LINK_DO_JOGO_AQUI">
<div class="card">
<img src="imagem2.jpg">
<div class="nome">Fortune Mouse</div>
</div>
</a>

<!-- CARD 3 -->
<a href="LINK_DO_JOGO_AQUI">
<div class="card">
<img src="imagem3.jpg">
<div class="nome">Fortune Gems</div>
</div>
</a>

<!-- CARD 4 -->
<a href="LINK_DO_JOGO_AQUI">
<div class="card">
<img src="imagem4.jpg">
<div class="nome">Onça Sortuda</div>
</div>
</a>

<!-- CARD 5 -->
<a href="LINK_DO_JOGO_AQUI">
<div class="card">
<img src="imagem5.jpg">
<div class="nome">Money Pot</div>
</div>
</a>

<!-- CARD 6 -->
<a href="LINK_DO_JOGO_AQUI">
<div class="card">
<img src="imagem6.jpg">
<div class="nome">Sevens Joy</div>
</div>
</a>

</div>

</body>
</html>
